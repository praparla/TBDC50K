    .t-fail { color: #fb7185; }

  <script>
    // ═══════════════════════════════════════
    // TEST HARNESS
    // ═══════════════════════════════════════
    const testResults = [];
    let totalPass = 0;
    let totalFail = 0;

    function assert(group, name, condition, detail) {
      const passed = !!condition;
      testResults.push({ group, name, passed, detail: detail || '' });
      if (passed) totalPass++;
      else totalFail++;
    }

    function renderResults() {
      const overlay = document.getElementById('test-overlay');
      const groups = {};
      testResults.forEach(r => {
        if (!groups[r.group]) groups[r.group] = [];
        groups[r.group].push(r);
      });

      let html = `<h1>Backend Feature Tests</h1>`;
      for (const [group, results] of Object.entries(groups)) {
        const groupFails = results.filter(r => !r.passed).length;
        html += `<div class="test-group">`;
        html += `<h2>${group} (${results.length - groupFails}/${results.length})</h2>`;
        results.forEach(r => {
          const cls = r.passed ? 't-pass' : 't-fail';
          const icon = r.passed ? '\u2714' : '\u2718';
          html += `<div class="t-row ${cls}">${icon} ${r.name}`;
          if (r.detail) html += ` <span class="t-detail">${r.detail}</span>`;
          html += `</div>`;
        });
        html += `</div>`;
      }

      const allPass = totalFail === 0;
      html += `<div class="t-summary ${allPass ? 'ok' : 'fail'}">
        ${allPass ? 'ALL TESTS PASSED' : totalFail + ' TEST(S) FAILED'}
      </div>`;
      html += `<div class="t-stats">
        <span>Total: ${totalPass + totalFail}</span>
        <span class="t-pass">Pass: ${totalPass}</span>
        <span class="t-fail">Fail: ${totalFail}</span>
        <span>Groups: ${Object.keys(groups).length}</span>
      </div>`;

      overlay.innerHTML = html;
    }

    // ═══════════════════════════════════════
    // HELPER: Get mock client + simulate auth
    // ═══════════════════════════════════════
    let mockClient = null;

    function getMockClient() {
      // TB_AUTH.getSupabase() returns the client created during init
      return TB_AUTH.getSupabase();
    }

    function simulateSignIn(userId, email, displayName) {
      const client = getMockClient();
      if (!client) return;

      const user = {
        id: userId || 'user-1',
        email: email || 'test@example.com',
        user_metadata: { full_name: displayName || 'Test User' },
      };

      // Seed profile so ensureProfile() finds it
      client._seedTable('profiles', [{
        id: user.id,
        display_name: displayName || 'Test User',
        role: 'runner',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString(),
      }]);

      // Trigger auth state change
      client._setSession({ user });
    }

    function resetMock() {
      const client = getMockClient();
      if (client && client._reset) client._reset();
    }

    // ═══════════════════════════════════════
    // TEST GROUPS
    // ═══════════════════════════════════════

    // 1. Config & Constants
    function testConfig() {
      const G = 'Config & Constants';

      assert(G, 'TB_CONFIG exists', typeof TB_CONFIG === 'object');
      assert(G, 'TB_CONFIG.FEATURES exists', typeof TB_CONFIG.FEATURES === 'object');
      assert(G, 'AUTH feature flag is boolean', typeof TB_CONFIG.FEATURES.AUTH === 'boolean');
      assert(G, 'FOOD_LOG feature flag is boolean', typeof TB_CONFIG.FEATURES.FOOD_LOG === 'boolean');
      assert(G, 'SOCIAL_FEED feature flag is boolean', typeof TB_CONFIG.FEATURES.SOCIAL_FEED === 'boolean');
      assert(G, 'PARTIES feature flag is boolean', typeof TB_CONFIG.FEATURES.PARTIES === 'boolean');
      assert(G, 'BETTING feature flag is boolean', typeof TB_CONFIG.FEATURES.BETTING === 'boolean');

      assert(G, 'TB_MENU_ITEMS is array', Array.isArray(TB_MENU_ITEMS));
      assert(G, 'TB_MENU_ITEMS has items', TB_MENU_ITEMS.length >= 10, `count: ${TB_MENU_ITEMS.length}`);
      assert(G, 'Menu includes Chalupa Supreme', TB_MENU_ITEMS.includes('Chalupa Supreme'));
      assert(G, 'Menu includes Baja Blast', TB_MENU_ITEMS.includes('Baja Blast'));

      assert(G, 'TB_MANDATORY_ITEMS exists', typeof TB_MANDATORY_ITEMS === 'object');
      assert(G, 'Mandatory stop3 items defined', Array.isArray(TB_MANDATORY_ITEMS.stop3) && TB_MANDATORY_ITEMS.stop3.length > 0);
      assert(G, 'Mandatory stop7 items defined', Array.isArray(TB_MANDATORY_ITEMS.stop7) && TB_MANDATORY_ITEMS.stop7.length > 0);

      assert(G, 'BET_TYPES exists', typeof BET_TYPES === 'object');
      assert(G, 'BET_TYPES has finish_time', BET_TYPES.finish_time && BET_TYPES.finish_time.label);
      assert(G, 'BET_TYPES has food_items', BET_TYPES.food_items && BET_TYPES.food_items.label);
      assert(G, 'BET_TYPES has bathroom_stops', BET_TYPES.bathroom_stops && BET_TYPES.bathroom_stops.label);
      assert(G, 'BET_TYPES has dnf', BET_TYPES.dnf && BET_TYPES.dnf.label);

      assert(G, 'PARTY_AMENITIES is array', Array.isArray(PARTY_AMENITIES));
      assert(G, 'PARTY_AMENITIES has items', PARTY_AMENITIES.length >= 5, `count: ${PARTY_AMENITIES.length}`);
      assert(G, 'Amenities have id/emoji/label', PARTY_AMENITIES.every(a => a.id && a.emoji && a.label));

    // 2. Mock Supabase Client
    function testMockSupabase() {
      const G = 'Mock Supabase Client';
      const client = MockSupabase.createClient('https://test.supabase.co', 'test-key');

      // Basic CRUD
      assert(G, 'createClient returns object', typeof client === 'object');
      assert(G, 'client.from returns builder', typeof client.from('profiles').select === 'function');
      assert(G, 'client.auth exists', typeof client.auth === 'object');
      assert(G, 'client.channel returns object', typeof client.channel('test') === 'object');

      // Test helpers
      assert(G, '_reset exists', typeof client._reset === 'function');
      assert(G, '_getTables exists', typeof client._getTables === 'function');
      assert(G, '_seedTable exists', typeof client._seedTable === 'function');

      // Reset
      client._reset();
      const tables = client._getTables();
      assert(G, 'Tables initialized empty', tables.profiles.length === 0 && tables.food_logs.length === 0);

      // Seed
      client._seedTable('profiles', [{ id: 'p1', display_name: 'Alice', role: 'runner' }]);
      assert(G, 'Seed populates table', client._getTables().profiles.length === 1);
      assert(G, 'Seeded data matches', client._getTables().profiles[0].display_name === 'Alice');

      client._reset();
    }

    // 3. Mock Supabase Query Builder
    async function testMockQueryBuilder() {
      const G = 'Mock Query Builder';
      const client = MockSupabase.createClient('https://test.supabase.co', 'test-key');

      // INSERT
      const { data: inserted, error: insertErr } = await client
        .from('profiles')
        .insert({ id: 'u1', display_name: 'Bob', role: 'runner' })
        .select()
        .single();

      assert(G, 'Insert returns data', inserted !== null);
      assert(G, 'Insert no error', insertErr === null);
      assert(G, 'Inserted row has id', inserted && inserted.id === 'u1');
      assert(G, 'Inserted row has display_name', inserted && inserted.display_name === 'Bob');
      assert(G, 'Inserted row has created_at', inserted && inserted.created_at);

      // SELECT
      const { data: selected } = await client
        .from('profiles')
        .select('*')
        .eq('id', 'u1')
        .single();

      assert(G, 'Select finds inserted row', selected !== null);
      assert(G, 'Select returns correct data', selected && selected.display_name === 'Bob');

      // UPDATE
      await client
        .from('profiles')
        .update({ display_name: 'Bobby' })
        .eq('id', 'u1');

      const { data: updated } = await client
        .from('profiles')
        .select('*')
        .eq('id', 'u1')
        .single();

      assert(G, 'Update modifies data', updated && updated.display_name === 'Bobby');

      // DELETE
      await client
        .from('profiles')
        .delete()
        .eq('id', 'u1');

      const { data: afterDelete } = await client
        .from('profiles')
        .select('*');

      assert(G, 'Delete removes row', afterDelete && afterDelete.length === 0);

      // INSERT MULTIPLE + ORDER + RANGE
      await client.from('food_logs').insert({ id: 'fl1', stop_number: 3, user_id: 'u1', created_at: '2026-01-01T10:00:00Z' }).select();
      await client.from('food_logs').insert({ id: 'fl2', stop_number: 1, user_id: 'u1', created_at: '2026-01-01T09:00:00Z' }).select();
      await client.from('food_logs').insert({ id: 'fl3', stop_number: 7, user_id: 'u1', created_at: '2026-01-01T11:00:00Z' }).select();

      const { data: ordered } = await client
        .from('food_logs')
        .select('*')
        .order('stop_number', { ascending: true });

      assert(G, 'Order ascending works', ordered && ordered[0].stop_number === 1);
      assert(G, 'Order has correct count', ordered && ordered.length === 3);

      const { data: ranged } = await client
        .from('food_logs')
        .select('*')
        .order('stop_number', { ascending: true })
        .range(0, 1);

      assert(G, 'Range limits results', ranged && ranged.length === 2);

      // ILIKE
      await client.from('profiles').insert({ id: 'u2', display_name: 'Charlie Runner', role: 'runner' }).select();
      await client.from('profiles').insert({ id: 'u3', display_name: 'Diana Cheerer', role: 'cheerer' }).select();

      const { data: ilikeResult } = await client
        .from('profiles')
        .select('*')
        .ilike('display_name', '%charlie%');

      assert(G, 'ILIKE finds match', ilikeResult && ilikeResult.length === 1);
      assert(G, 'ILIKE case insensitive', ilikeResult && ilikeResult[0].display_name === 'Charlie Runner');

      // NOT
      await client.from('bets').insert({ id: 'b1', creator_id: 'u2', is_correct: true }).select();
      await client.from('bets').insert({ id: 'b2', creator_id: 'u2', is_correct: null }).select();

      const { data: notNullResult } = await client
        .from('bets')
        .select('*')
        .not('is_correct', 'is', null);

      assert(G, 'NOT is null filters correctly', notNullResult && notNullResult.length === 1);
      assert(G, 'NOT result is correct row', notNullResult && notNullResult[0].id === 'b1');

      // IN
      const { data: inResult } = await client
        .from('food_logs')
        .select('*')
        .in('id', ['fl1', 'fl3']);

      assert(G, 'IN filter works', inResult && inResult.length === 2);

      client._reset();
    }

    // 4. Mock Auth
    async function testMockAuth() {
      const G = 'Mock Auth';
      const client = MockSupabase.createClient('https://test.supabase.co', 'test-key');

      // Initial state
      const { data: { session: initialSession } } = await client.auth.getSession();
      assert(G, 'No session initially', initialSession === null);

      // Sign in with OTP
      const { error: otpErr } = await client.auth.signInWithOtp({ email: 'alice@test.com' });
      assert(G, 'signInWithOtp no error', otpErr === null);

      const { data: { session: afterOtp } } = await client.auth.getSession();
      assert(G, 'Session exists after OTP sign-in', afterOtp !== null);
      assert(G, 'Session has user', afterOtp && afterOtp.user);
      assert(G, 'User has email', afterOtp && afterOtp.user.email === 'alice@test.com');

      // Invalid email
      const { error: badEmail } = await client.auth.signInWithOtp({ email: 'not-an-email' });
      assert(G, 'Invalid email returns error', badEmail !== null);

      // Sign out
      await client.auth.signOut();
      const { data: { session: afterSignout } } = await client.auth.getSession();
      assert(G, 'Session null after sign-out', afterSignout === null);

      // Auth state change listener
      let lastEvent = null;
      client.auth.onAuthStateChange((event, session) => { lastEvent = event; });
      await client.auth.signInWithOAuth({ provider: 'google' });
      assert(G, 'Auth listener fires on sign-in', lastEvent === 'SIGNED_IN');

      await client.auth.signOut();
      assert(G, 'Auth listener fires on sign-out', lastEvent === 'SIGNED_OUT');

      client._reset();
    }

    // 5. Mock Realtime
    async function testMockRealtime() {
      const G = 'Mock Realtime';
      const client = MockSupabase.createClient('https://test.supabase.co', 'test-key');

      let receivedPayload = null;
      const channel = client
        .channel('food_logs_realtime')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'food_logs' }, (payload) => {
          receivedPayload = payload;
        })
        .subscribe();

      assert(G, 'Channel created', channel !== null);

      // Trigger an insert
      await client.from('food_logs').insert({ id: 'rt1', stop_number: 5, user_id: 'u1' }).select();

      assert(G, 'Realtime listener fires on INSERT', receivedPayload !== null);
      assert(G, 'Payload has eventType', receivedPayload && receivedPayload.eventType === 'INSERT');
      assert(G, 'Payload has new row', receivedPayload && receivedPayload.new && receivedPayload.new.id === 'rt1');

      // Test UPDATE event
      let updatePayload = null;
      const ch2 = client
        .channel('parties_realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'parties' }, (payload) => {
          updatePayload = payload;
        })
        .subscribe();

      await client.from('parties').insert({ id: 'p1', name: 'Test Party', host_id: 'u1', is_live: false }).select();
      assert(G, 'Party INSERT triggers listener', updatePayload && updatePayload.eventType === 'INSERT');

      await client.from('parties').update({ is_live: true }).eq('id', 'p1');
      assert(G, 'Party UPDATE triggers listener', updatePayload && updatePayload.eventType === 'UPDATE');
      assert(G, 'Update payload has new data', updatePayload && updatePayload.new && updatePayload.new.is_live === true);

      // Test DELETE event
      await client.from('parties').delete().eq('id', 'p1');
      assert(G, 'Party DELETE triggers listener', updatePayload && updatePayload.eventType === 'DELETE');

      // removeChannel (should not throw)
      client.removeChannel(channel);
      assert(G, 'removeChannel does not throw', true);

      client._reset();
    }

    // 8. TB_DB Not-Authenticated Guards
    async function testDBAuthGuards() {
      const G = 'DB Auth Guards';

      // Before sign in, all operations should return 'Not authenticated'
      const { data: d1, error: e1 } = await TB_DB.insertFoodLog({ stop_number: 1, menu_items: [] });
      assert(G, 'insertFoodLog blocked when not authed', d1 === null && e1 === 'Not authenticated');

      const { data: d2, error: e2 } = await TB_DB.fetchMyFoodLogs();
      assert(G, 'fetchMyFoodLogs blocked when not authed', d2 === null && e2 === 'Not authenticated');

      const { data: d3, error: e3 } = await TB_DB.insertParty({ name: 'X', lat: 0, lng: 0 });
      assert(G, 'insertParty blocked when not authed', d3 === null && e3 === 'Not authenticated');

      const { data: d4, error: e4 } = await TB_DB.insertBet({ target_runner_id: 'x', bet_type: 'dnf', prediction: {} });
      assert(G, 'insertBet blocked when not authed', d4 === null && e4 === 'Not authenticated');

      const { data: d5, error: e5 } = await TB_DB.searchRunners('test');
      assert(G, 'searchRunners blocked when not authed', d5 === null && e5 === 'Not authenticated');

      const { data: d6, error: e6 } = await TB_DB.fetchMyBets();
      assert(G, 'fetchMyBets blocked when not authed', d6 === null && e6 === 'Not authenticated');

    // 16. Mandatory Food Rule Logic
    function testMandatoryRules() {
      const G = 'Mandatory Food Rules';

      // Stop 3 qualifying items
      assert(G, 'Stop 3 requires Chalupa Supreme or Crunchwrap Supreme',
        TB_MANDATORY_ITEMS.stop3.includes('Chalupa Supreme') &&
        TB_MANDATORY_ITEMS.stop3.includes('Crunchwrap Supreme'));

      // Stop 7 qualifying items
      assert(G, 'Stop 7 requires Burrito Supreme or Nachos Bell Grande',
        TB_MANDATORY_ITEMS.stop7.includes('Burrito Supreme') &&
        TB_MANDATORY_ITEMS.stop7.includes('Nachos Bell Grande'));

      // All mandatory items exist in menu
      const allMandatory = [...TB_MANDATORY_ITEMS.stop3, ...TB_MANDATORY_ITEMS.stop7];
      allMandatory.forEach(item => {
        assert(G, `Mandatory item "${item}" exists in menu`, TB_MENU_ITEMS.includes(item));
      });

      // Test rule satisfaction logic (mimics food-log.js checkMandatoryRules)
      const testLogs = [
        { stop_number: 3, menu_items: [{ item: 'Chalupa Supreme' }] },
        { stop_number: 5, menu_items: [{ item: 'Bean Burrito' }] },
      ];

      const stop3Items = testLogs
        .filter(l => l.stop_number === 3)
        .flatMap(l => l.menu_items.map(m => m.item));
      const rule1 = TB_MANDATORY_ITEMS.stop3.some(item => stop3Items.includes(item));
      assert(G, 'Stop 3 rule satisfied with Chalupa Supreme', rule1 === true);

      const stop7Items = testLogs
        .filter(l => l.stop_number === 7)
        .flatMap(l => l.menu_items.map(m => m.item));
      const rule2 = TB_MANDATORY_ITEMS.stop7.some(item => stop7Items.includes(item));
      assert(G, 'Stop 7 rule NOT satisfied (no qualifying food at stop 7)', rule2 === false);
    }

      assert(G, 'fetchMyStats returns no error', !statsErr);
      assert(G, 'fetchMyStats returns food_logs count', stats && typeof stats.food_logs === 'number');
      assert(G, 'fetchMyStats returns bets_placed count', stats && typeof stats.bets_placed === 'number');
      assert(G, 'fetchMyStats returns parties_hosted count', stats && typeof stats.parties_hosted === 'number');
    }

    // 21. Delete Account Flow
    async function testDeleteAccount() {
      const G = 'Delete Account';

      const client = TB_AUTH.getSupabase();
      const session = client._getSession();
      const uid = session.user.id;

      // Seed data for the user
      const tables = client._getTables();
      if (!tables.profiles.find(p => p.id === uid)) {
        tables.profiles.push({ id: uid, display_name: 'Delete Me', role: 'runner' });
      }
      tables.food_logs.push({ id: 'fl-del-1', user_id: uid, stop_number: 1, menu_items: [] });
      tables.bets.push({ id: 'bet-del-1', creator_id: uid, target_runner_id: 'other', bet_type: 'dnf', prediction: {} });
      tables.parties.push({ id: 'party-del-1', host_id: uid, name: 'Del Party', lat: 0, lng: 0 });

      // Verify data exists
      assert(G, 'Profile exists before delete', tables.profiles.some(p => p.id === uid));
      assert(G, 'Food logs exist before delete', tables.food_logs.some(f => f.user_id === uid));
      assert(G, 'Bets exist before delete', tables.bets.some(b => b.creator_id === uid));
      assert(G, 'Parties exist before delete', tables.parties.some(p => p.host_id === uid));

      // Delete account
      const { error } = await TB_DB.deleteMyAccount();
      assert(G, 'deleteMyAccount returns no error', !error);

      // Verify cascade delete
      assert(G, 'Profile deleted', !tables.profiles.some(p => p.id === uid));
      assert(G, 'Food logs deleted', !tables.food_logs.some(f => f.user_id === uid));
      assert(G, 'Bets deleted', !tables.bets.some(b => b.creator_id === uid));
      assert(G, 'Parties deleted', !tables.parties.some(p => p.host_id === uid));

      // Re-seed profile for later tests
      tables.profiles.push({ id: uid, display_name: 'Test User', role: 'runner', avatar_emoji: '', preferences: {} });
    }

    // 22. Preferences Sync Module
    function testPrefsSync() {
      const G = 'Prefs Sync';

      assert(G, 'TB_PREFS_SYNC is defined', typeof TB_PREFS_SYNC !== 'undefined');
      assert(G, 'init is a function', typeof TB_PREFS_SYNC.init === 'function');
      assert(G, 'syncFromCloud is a function', typeof TB_PREFS_SYNC.syncFromCloud === 'function');
      assert(G, 'syncToCloud is a function', typeof TB_PREFS_SYNC.syncToCloud === 'function');
      assert(G, 'setEnabled is a function', typeof TB_PREFS_SYNC.setEnabled === 'function');
      assert(G, 'isEnabled is a function', typeof TB_PREFS_SYNC.isEnabled === 'function');

      // SYNC_KEYS constant exists
      assert(G, 'SYNC_KEYS is defined', typeof SYNC_KEYS !== 'undefined');
      assert(G, 'SYNC_KEYS has entries', SYNC_KEYS.length > 0);
      assert(G, 'SYNC_KEYS includes tb50k_theme', SYNC_KEYS.includes('tb50k_theme'));
      assert(G, 'SYNC_KEYS includes tb50k_view_mode', SYNC_KEYS.includes('tb50k_view_mode'));

      // Toggle sync
      TB_PREFS_SYNC.setEnabled(true);
      assert(G, 'Sync can be enabled', TB_PREFS_SYNC.isEnabled() === true);
      assert(G, 'Sync preference saved to localStorage', localStorage.getItem('tb50k_prefs_sync') === 'true');

      TB_PREFS_SYNC.setEnabled(false);
      assert(G, 'Sync can be disabled', TB_PREFS_SYNC.isEnabled() === false);

      // Clean up
      localStorage.removeItem('tb50k_prefs_sync');
    }

    // 23. View Toggle
    function testViewToggle() {
      const G = 'View Toggle';

      // DOM elements
      const toggle = document.getElementById('view-toggle');
      assert(G, 'View toggle exists', toggle !== null);

      const btns = toggle.querySelectorAll('.view-toggle-btn');
      assert(G, 'View toggle has 2 buttons', btns.length === 2);
      assert(G, 'Runner button exists', btns[0].dataset.view === 'runner');
      assert(G, 'Crew button exists', btns[1].dataset.view === 'crew');

      // Default is runner
      const defaultMode = localStorage.getItem('tb50k_view_mode') || 'runner';
      assert(G, 'Default view mode is runner', defaultMode === 'runner');

      // Simulate setting crew mode
      localStorage.setItem('tb50k_view_mode', 'crew');
      window.TB_VIEW_MODE = 'crew';
      assert(G, 'View mode can be set to crew', window.TB_VIEW_MODE === 'crew');

      // Reset
      localStorage.setItem('tb50k_view_mode', 'runner');
      window.TB_VIEW_MODE = 'runner';
    }

    // 24. Mock RPC
    async function testMockRpc() {
      const G = 'Mock RPC';

      const client = TB_AUTH.getSupabase();

      // Test unknown RPC
      const { error: unknownErr } = await client.rpc('nonexistent');
      assert(G, 'Unknown RPC returns error', unknownErr && unknownErr.message.includes('Unknown RPC'));

      // Test delete_own_account RPC
      const session = client._getSession();
      const uid = session.user.id;
      const tables = client._getTables();

      // Seed test data
      if (!tables.profiles.find(p => p.id === uid)) {
        tables.profiles.push({ id: uid, display_name: 'RPC Test', role: 'runner' });
      }
      tables.food_logs.push({ id: 'fl-rpc-1', user_id: uid, stop_number: 2, menu_items: [] });

      const { error: delErr } = await client.rpc('delete_own_account');
      assert(G, 'delete_own_account RPC returns no error', !delErr);
      assert(G, 'Profile deleted via RPC', !tables.profiles.find(p => p.id === uid));
      assert(G, 'Food logs cascaded via RPC', !tables.food_logs.find(f => f.user_id === uid));

      // Re-seed for remaining tests
      tables.profiles.push({ id: uid, display_name: 'Test User', role: 'runner', avatar_emoji: '', preferences: {} });
    }

    // 25. Toast Notifications
    function testToastNotifications() {
      const G = 'Toast Notifications';

      // Show a toast
      TB_AUTH.showToast('Test message', 'info');
      const toast = document.getElementById('auth-toast');
      assert(G, 'Toast element created', toast !== null);
      assert(G, 'Toast has correct text', toast && toast.textContent === 'Test message');
      assert(G, 'Toast has info class', toast && toast.classList.contains('auth-toast-info'));

      // Clean up
      if (toast) toast.remove();

      // Show warning toast
      TB_AUTH.showToast('Warning!', 'warning');
      const warnToast = document.getElementById('auth-toast');
      assert(G, 'Warning toast created', warnToast !== null);
      assert(G, 'Warning toast has warning class', warnToast && warnToast.classList.contains('auth-toast-warning'));
      if (warnToast) warnToast.remove();

      // Show error toast
      TB_AUTH.showToast('Error!', 'error');
      const errToast = document.getElementById('auth-toast');
      assert(G, 'Error toast created', errToast !== null);
      assert(G, 'Error toast has error class', errToast && errToast.classList.contains('auth-toast-error'));
      if (errToast) errToast.remove();
    }

    // ═══════════════════════════════════════
    // RUN ALL TESTS
    // ═══════════════════════════════════════
    async function runAllTests() {
      try {
        // Sync tests
        testConfig();
        testMockSupabase();
        testAuthModule();
        testDBModule();
        testGracefulDegradation();
        testMandatoryRules();
        testAuthBarUI();
        testOfflineCache();

        // Async tests
        await testMockQueryBuilder();
        await testMockAuth();
        await testMockRealtime();

        // Initialize TB_AUTH so getSupabase() returns the mock client
        TB_AUTH.init();
        await new Promise(r => setTimeout(r, 200));

        await testDBAuthGuards();
        await testDBCrudWithAuth();
        await testEdgeCases();

        // UI rendering tests (after init)
        testFoodLogModule();
        testSocialFeedModule();
        testPartyModule();
        testBettingModule();

        // New account/login tests
        testAccountSettingsPanel();
        await testDBAccountManagement();
        await testDeleteAccount();
        testPrefsSync();
        testViewToggle();
        await testMockRpc();
        testToastNotifications();
      } catch (err) {
        console.error('Test runner error:', err);
        assert('Test Runner', 'No uncaught errors', false, err.message);
      }

      renderResults();
    }

    // Start after a tick so all scripts are loaded
    setTimeout(() => {
      requestAnimationFrame(() => {
        runAllTests();
      });
    }, 500);
  </script>
